<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
    <link type="text/css" rel="stylesheet" href="../../css/registerForm.css">
    <style>

    </style>
    <script type="text/javascript">
        // 显示错误
        function showError(inputId, errorId, message) {
            const input = document.getElementById(inputId);
            const errorSpan = document.getElementById(errorId);
            input.className = 'input-error';
            errorSpan.textContent = message;
            return false;
        }

        // 显示正确
        function showSuccess(inputId, errorId) {
            const input = document.getElementById(inputId);
            const errorSpan = document.getElementById(errorId);
            input.className = 'input-success';
            errorSpan.textContent = '';
            return true;
        }

        // 清除提示
        function clearError(inputId, errorId) {
            const input = document.getElementById(inputId);
            const errorSpan = document.getElementById(errorId);
            input.className = '';
            errorSpan.textContent = '';
        }

        // 校验用户名（失去焦点时调用）
        function checkUsername() {
            const value = document.getElementById('username').value.trim();
            if (value === '') {
                return showError('username', 'usernameError', '用户名不能为空');
            }
            if (value.length < 3 || value.length > 20) {
                return showError('username', 'usernameError', '用户名长度应为 3-20 位');
            }
            return showSuccess('username', 'usernameError');
        }

        // 校验密码（失去焦点时调用）
        function checkPassword() {
            const value = document.getElementById('password').value;
            if (value === '') {
                return showError('password', 'passwordError', '密码不能为空');
            }
            if (value.length < 6 || value.length > 16) {
                return showError('password', 'passwordError', '密码长度应为 6-16 位');
            }
            return showSuccess('password', 'passwordError');
        }

        // 校验手机号（失去焦点时调用）
        function checkPhone() {
            const value = document.getElementById('phone').value.trim();
            if (value === '') {
                return showError('phone', 'phoneError', '手机号不能为空');
            }
            if (!/^1[3-9]\d{9}$/.test(value)) {
                return showError('phone', 'phoneError', '请输入正确的手机号（11 位数字）');
            }
            return showSuccess('phone', 'phoneError');
        }

        // 提交时校验所有字段
        function check() {
            let ok = true;
            ok = checkUsername() && checkPassword() && checkPhone();
            // 检查结果
            if (!ok) {
                alert('❌ 请修正表单中的错误后再提交！');
                return false;
            }

            alert('✅ 校验通过！准备提交...\n用户名：' + document.getElementById('username').value + '\n手机号：' + document.getElementById('phone').value);
            return true;
        }

        // 重置表单
        document.getElementById('registerForm').addEventListener('reset', function() {
            setTimeout(() => {
                clearError('username', 'usernameError');
                clearError('password', 'passwordError');
                clearError('phone', 'phoneError');
            }, 10);
        });
    </script>
</head>
<body>
<!-- 1. 导航栏模块 -->
<div class="navbar">
    <div class="nav-left">
        <span class="logo">网上衣橱</span>
        <a href="http://localhost:8080/web1/index.jsp">首页</a>
        <a href="#">服装类别</a>
        <a href="#">服装风格</a>
        <a href="#">购物车</a>
        <a href="#">我的订单</a>
        <a href="#">个人中心</a>
        <a href="http://localhost:8080/web1/pages/front/register.html">注册</a>
        <a href="http://localhost:8080/web1/pages/front/login.html">登录</a>
    </div>
    <div class="nav-right">**，欢迎您！</div>
</div>
<!-- 2. 注册表单区域 -->
<div class="register-container">
    <h2 class="register-title">用户注册</h2>
    <form id="registerForm" onsubmit="check()">
        <!-- 用户名 - 必填 -->
        <div class="form-row">
            <label><span class="required">*</span>用户名</label>
            <input type="text" name="username" placeholder="请输入用户名" value="" id="username" onblur="checkUsername();">
            <span class="icon-placeholder">●</span> <!-- 图标占位符 -->
            <span class="error-msg" id="usernameError"></span>
        </div>
        <!-- 密码 - 必填，密码类型 -->
        <div class="form-row">
            <label><span class="required">*</span>密码</label>
            <input type="password" name="password" placeholder="请输入密码" value="" id="password" onblur="checkPassword();">
            <span class="icon-placeholder">●</span> <!-- 图标占位符 -->
            <span class="error-msg" id="passwordError"></span>
        </div>
        <!-- 手机号 - 必填 -->
        <div class="form-row">
            <label><span class="required">*</span>手机号</label>
            <input type="tel" name="phone" placeholder="请输入手机号" value=""  id="phone" onblur="checkPhone();">
            <span class="icon-placeholder">●</span> <!-- 图标占位符 -->
            <span class="error-msg" id="phoneError"></span>
        </div>
        <!-- 地址 - 非必填 -->
        <div class="form-row">
            <label>地址</label>
            <input type="text" name="address" placeholder="请输入地址（选填）" value="" id="address">
            <span class="icon-placeholder">●</span> <!-- 图标占位符 -->
        </div>
        <!-- 按钮组 -->
        <div class="btn-group">
            <button type="submit" class="btn btn-register">注册</button>
            <button type="reset" class="btn btn-reset">重置</button>
        </div>
    </form>
</div>

</body>
</html>
