<!-- 登录表单 -->
<div class="login-container">
  <h2>用户登录</h2>
  <form id="loginForm">
    <div class="form-group">
      <label for="username">用户名/电话</label>
      <input type="text" id="username" placeholder="请输入用户名/电话"  required>
    </div>
    <div class="form-group">
      <label for="pwd">密码</label>
      <input type="password" id="pwd" placeholder="请输入密码" required>
    </div>
    <div class="btn-group">
      <button type="button" class="btn btn-login">登录</button>
      <button type="reset" class="btn btn-reset">重置</button>
    </div>
  </form>
</div>
